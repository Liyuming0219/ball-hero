<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>球球英雄 - Ball Hero</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh; /* 动态视口高度，适配手机地址栏 */
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        canvas {
            display: block;
            touch-action: none; /* 阻止浏览器手势 */
            -webkit-touch-callout: none;
        }
        #gameCanvas {
            border: none;
            border-radius: 0;
        }
        /* 加载提示 */
        #loadingMsg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-size: 16px;
            z-index: 999;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="loadingMsg">加载中...</div>
    <script>
        // 串行加载保证脚本依赖顺序正确
        // 带重试机制，防止网络波动导致加载链断裂
        (function() {
            var V = Date.now(); // 自动版本号：每次加载唯一，彻底避免CDN缓存旧文件
            var scripts = [
                'js/utils.js', 'js/particles.js', 'js/characters.js',
                'js/enemies.js', 'js/weapons.js', 'js/summons.js',
                'js/upgrades.js', 'js/ui.js', 'js/game.js'
            ];
            var i = 0;
            var MAX_RETRIES = 3;

            function loadNext() {
                if (i >= scripts.length) {
                    // 所有脚本加载完成，启动游戏
                    var msg = document.getElementById('loadingMsg');
                    if (msg) msg.parentNode.removeChild(msg);
                    try {
                        var game = new Game('gameCanvas');
                        game.start();
                    } catch (e) {
                        showError('游戏启动失败: ' + e.message);
                    }
                    return;
                }
                loadScript(scripts[i], 0);
            }

            function loadScript(src, retryCount) {
                var s = document.createElement('script');
                s.src = src + '?v=' + V;
                s.onload = function() {
                    i++;
                    loadNext();
                };
                s.onerror = function() {
                    // 移除失败的 script 标签
                    if (s.parentNode) s.parentNode.removeChild(s);
                    if (retryCount < MAX_RETRIES) {
                        // 延迟重试，每次加长等待时间
                        var delay = (retryCount + 1) * 500;
                        updateLoading('加载失败，正在重试...');
                        setTimeout(function() {
                            loadScript(src, retryCount + 1);
                        }, delay);
                    } else {
                        showError('脚本加载失败，请检查网络后刷新页面');
                    }
                };
                document.body.appendChild(s);
            }

            function updateLoading(text) {
                var msg = document.getElementById('loadingMsg');
                if (msg) msg.textContent = text;
            }

            function showError(text) {
                var msg = document.getElementById('loadingMsg');
                if (msg) {
                    msg.textContent = text;
                    msg.style.color = '#ff6666';
                }
            }

            loadNext();
        })();
    </script>
</body>
</html>
