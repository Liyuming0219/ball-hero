<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>球球英雄 - Ball Hero</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh; /* 动态视口高度，适配手机地址栏 */
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        canvas {
            display: block;
            touch-action: none; /* 阻止浏览器手势 */
            -webkit-touch-callout: none;
        }
        #gameCanvas {
            border: none;
            border-radius: 0;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        // 自动版本号：每次部署后玩家自动加载最新代码，彻底解决缓存问题
        // 串行加载保证脚本依赖顺序正确
        (function() {
            const V = Date.now();
            const scripts = [
                'js/utils.js', 'js/particles.js', 'js/characters.js',
                'js/enemies.js', 'js/weapons.js', 'js/summons.js',
                'js/upgrades.js', 'js/ui.js', 'js/game.js'
            ];
            let i = 0;
            function loadNext() {
                if (i >= scripts.length) {
                    const game = new Game('gameCanvas');
                    game.start();
                    return;
                }
                const s = document.createElement('script');
                s.src = scripts[i] + '?v=' + V;
                s.onload = () => { i++; loadNext(); };
                document.body.appendChild(s);
            }
            loadNext();
        })();
    </script>
</body>
</html>
